<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Reanimatie Timer</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reanimatie">
<meta name="theme-color" content="#0a0a0d">
<meta name="mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0d;
  --surface: rgba(255,255,255,0.05);
  --surface2: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.13);
  --text: #e8e8ee;
  --text2: #b0b0bc;
  --text3: #7a7a88;
  --accent: #30d158;
  --accent-dim: rgba(48,209,88,0.15);
  --red: #ff453a;
  --mono: 'Roboto Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overscroll-behavior: none;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

/* Background glow */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 40% at 50% 0%, rgba(48,209,88,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 100%, rgba(48,209,88,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── Header ── */
.header {
  padding: 20px 24px 0;
  position: relative;
  z-index: 1;
}

.header-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 4px;
}

.header-title {
  font-size: 28px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.1;
}

/* ── Timer block ── */
.timer-section {
  padding: 40px 24px 20px;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.timer-display {
  font-family: var(--mono);
  font-size: 52px;
  font-weight: 300;
  letter-spacing: -1px;
  color: var(--text);
  line-height: 1;
  transition: color 0.3s;
  text-align: center;
}

.timer-display.running {
  color: #ffffff;
}

.rec-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 12px;
  min-height: 20px;
}

.rec-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text3);
  transition: background 0.3s;
  flex-shrink: 0;
}

.rec-dot.live {
  background: var(--red);
  animation: recpulse 1.4s ease-in-out infinite;
}

@keyframes recpulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.35; transform: scale(0.7); }
}

.rec-text {
  font-size: 13px;
  font-weight: 400;
  color: var(--text2);
  transition: color 0.3s;
}

.rec-text.live {
  color: var(--red);
  font-weight: 500;
}

/* ── Buttons ── */
.btn-row {
  display: flex;
  gap: 10px;
  padding: 0 24px;
  position: relative;
  z-index: 1;
}

.btn {
  height: 54px;
  border-radius: 16px;
  border: none;
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform 0.1s, opacity 0.15s;
  -webkit-user-select: none;
  user-select: none;
}

.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

.btn-start {
  flex: 1;
  background: var(--accent);
  color: #0a0a0d;
}

.btn-stop {
  flex: 1;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border2);
}

.btn-export {
  width: 54px;
  flex-shrink: 0;
  background: var(--surface);
  color: var(--text2);
  border: 1px solid var(--border);
  font-size: 22px;
  border-radius: 16px;
}

/* ── Log section ── */
.log-section {
  display: flex;
  flex-direction: column;
  max-height: 45vh;
  margin-top: 24px;
  position: relative;
  z-index: 1;
  overflow: hidden;
}

.log-header {
  display: grid;
  grid-template-columns: 72px 1fr;
  gap: 12px;
  padding: 0 24px 10px;
  border-bottom: 0.5px solid var(--border);
}

.log-col-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
}

.log-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

.log-inner {
  padding: 0 24px 40px;
}

.log-entry {
  display: grid;
  grid-template-columns: 72px 1fr;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 0.5px solid var(--border);
  animation: slidein 0.2s ease;
}

.log-entry:last-child { border-bottom: none; }

@keyframes slidein {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

.entry-ts {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 400;
  color: var(--accent);
  padding-top: 1px;
  line-height: 1.55;
}

.entry-ts.interim { color: var(--text3); }

.entry-text {
  font-size: 15px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.55;
}

.entry-text.interim {
  color: var(--text2);
  font-style: italic;
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 24px;
  gap: 12px;
  text-align: center;
}

.empty-icon {
  font-size: 36px;
  color: var(--text3);
  opacity: 0.5;
}

.empty-label {
  font-size: 14px;
  color: var(--text3);
  line-height: 1.6;
}

/* ── No support banner ── */
.no-support {
  margin: 0 24px 16px;
  background: rgba(255,69,58,0.1);
  border: 0.5px solid rgba(255,69,58,0.3);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 13px;
  color: #ff6b6b;
  line-height: 1.5;
  display: none;
  position: relative;
  z-index: 1;
}

/* ── Divider ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 20px 24px 0;
  position: relative;
  z-index: 1;
}

/* ── Reset button (long press hint) ── */
.footer-hint {
  text-align: center;
  padding: 10px 24px 0;
  font-size: 11px;
  color: var(--text3);
  position: relative;
  z-index: 1;
}

/* ── Icons (inline SVG) ── */
.icon-play { display: inline-block; width: 16px; height: 16px; fill: currentColor; vertical-align: -2px; }
.icon-stop { display: inline-block; width: 14px; height: 14px; fill: currentColor; vertical-align: -1px; }

</style>
</head>
<body>

<div class="timer-section">
  <div class="timer-display" id="timer">00:00:00</div>
  <div class="rec-row">
    <div class="rec-dot" id="rec-dot"></div>
    <span class="rec-text" id="rec-text">Klaar om te starten</span>
  </div>
</div>

<div class="no-support" id="no-support">
  ⚠️ Gebruik Safari op iPhone voor spraakherkenning. Chrome op Android werkt ook.
</div>

<div class="btn-row">
  <button class="btn btn-start" id="btn-start">
    <svg class="icon-play" viewBox="0 0 16 16"><path d="M3 2.5l11 5.5-11 5.5V2.5z"/></svg>
    Start
  </button>
  <button class="btn btn-stop" id="btn-stop" disabled>
    <svg class="icon-stop" viewBox="0 0 14 14"><rect x="1" y="1" width="12" height="12" rx="2"/></svg>
    Stop
  </button>
  <button class="btn btn-export" id="btn-export" disabled aria-label="Exporteer">
    ↓
  </button>
</div>

<div class="divider"></div>

<div class="log-section">
  <div class="log-header">
    <div class="log-col-label">Tijd</div>
    <div class="log-col-label">Handeling</div>
  </div>
  <div class="log-scroll">
    <div class="log-inner" id="log-inner">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🎙</div>
        <div class="empty-label">Start de timer en spreek uw handelingen hardop uit. Elke zin krijgt automatisch een tijdstempel.</div>
      </div>
    </div>
  </div>
</div>

<script>
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const elTimer    = document.getElementById('timer');
  const elLog      = document.getElementById('log-inner');
  const elEmpty    = document.getElementById('empty-state');
  const elRecDot   = document.getElementById('rec-dot');
  const elRecText  = document.getElementById('rec-text');
  const btnStart   = document.getElementById('btn-start');
  const btnStop    = document.getElementById('btn-stop');
  const btnExport  = document.getElementById('btn-export');
  const noSupport  = document.getElementById('no-support');
  const logScroll  = document.querySelector('.log-scroll');

  if (!SpeechRecognition) {
    noSupport.style.display = 'block';
    btnStart.disabled = true;
  }

  let timerInterval = null;
  let startTime     = null;
  let elapsedMs     = 0;
  let recognition   = null;
  let isRunning     = false;
  let entries       = [];
  let interimRow    = null;
  let interimTs     = null;
  let lastMinute    = 0;
  let audioCtx      = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function beep() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    } catch(e) {}
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function formatFull(ms) {
    const t = Math.floor(ms / 1000);
    const cs = Math.floor((ms % 1000) / 10);
    return [Math.floor(t / 3600), Math.floor((t % 3600) / 60), t % 60].map(pad).join(':') + '.' + pad(cs);
  }

  function formatShort(ms) {
    const t = Math.floor(ms / 1000);
    const h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60;
    return h > 0 ? [h, m, s].map(pad).join(':') : [m, s].map(pad).join(':');
  }

  function getElapsed() {
    return elapsedMs + (startTime ? Date.now() - startTime : 0);
  }

  function tick() {
    const ms = getElapsed();
    elTimer.textContent = formatFull(ms);
    const mins = Math.floor(ms / 60000);
    if (mins > 0 && mins !== lastMinute) {
      lastMinute = mins;
      beep();
    }
  }

  function removeEmpty() {
    if (elEmpty && elEmpty.parentNode === elLog) elEmpty.remove();
  }

  function scrollBottom() {
    logScroll.scrollTop = logScroll.scrollHeight;
  }

  function addFinal(text, ts) {
    if (!text.trim()) return;
    const finalTs = interimTs !== null ? interimTs : ts;
    entries.push({ ts: finalTs, text });
    if (interimRow) { interimRow.remove(); interimRow = null; interimTs = null; }
    removeEmpty();
    const row = document.createElement('div');
    row.className = 'log-entry';
    row.innerHTML = `<div class="entry-ts">${formatShort(finalTs)}</div><div class="entry-text">${escapeHtml(text)}</div>`;
    elLog.appendChild(row);
    scrollBottom();
  }

  function updateInterim(text) {
    if (!text.trim()) return;
    removeEmpty();
    if (!interimRow) {
      interimTs = getElapsed();
      interimRow = document.createElement('div');
      interimRow.className = 'log-entry';
      elLog.appendChild(interimRow);
    }
    interimRow.innerHTML = `<div class="entry-ts interim">${formatShort(interimTs)}</div><div class="entry-text interim">${escapeHtml(text)}</div>`;
    scrollBottom();
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function startRecognition() {
    if (!SpeechRecognition) return;
    recognition = new SpeechRecognition();
    recognition.lang = 'nl-NL';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const r = e.results[i];
        if (r.isFinal) addFinal(r[0].transcript.trim(), getElapsed());
        else interim += r[0].transcript;
      }
      if (interim) updateInterim(interim);
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech') return;
      console.warn('Speech error:', e.error);
    };

    recognition.onend = () => {
      if (isRunning) { try { recognition.start(); } catch(err) {} }
    };

    try { recognition.start(); } catch(err) {}
  }

  btnStart.addEventListener('click', () => {
    if (isRunning) return;
    isRunning = true;
    startTime = Date.now();
    getAudioCtx();
    timerInterval = setInterval(tick, 30);
    startRecognition();
    elTimer.classList.add('running');
    btnStart.disabled = true;
    btnStop.disabled = false;
    elRecDot.classList.add('live');
    elRecText.classList.add('live');
    elRecText.textContent = 'REC · spreek handelingen hardop uit';
  });

  btnStop.addEventListener('click', () => {
    if (!isRunning) return;
    isRunning = false;
    elapsedMs = getElapsed();
    startTime = null;
    clearInterval(timerInterval);
    lastMinute = 0;
    if (recognition) { recognition.onend = null; recognition.stop(); recognition = null; }
    if (interimRow) { interimRow.remove(); interimRow = null; interimTs = null; }
    elTimer.classList.remove('running');
    btnStop.disabled = true;
    btnStart.disabled = false;
    btnStart.innerHTML = `<svg class="icon-play" viewBox="0 0 16 16"><path d="M3 2.5l11 5.5-11 5.5V2.5z"/></svg> Hervatten`;
    elRecDot.classList.remove('live');
    elRecText.classList.remove('live');
    elRecText.textContent = `Gestopt · ${entries.length} handeling${entries.length !== 1 ? 'en' : ''} geregistreerd`;
    if (entries.length > 0) btnExport.disabled = false;
  });

  btnExport.addEventListener('click', () => {
    if (!entries.length) return;
    const totalTime = formatFull(elapsedMs || getElapsed());
    let content = `Reanimatie logboek\nDatum: ${new Date().toLocaleDateString('nl-NL')}\nTotale tijd: ${totalTime}\n\n`;
    content += `TIJD\t\tHANDELING\n`;
    content += `${'─'.repeat(40)}\n`;
    content += entries.map(e => `${formatShort(e.ts)}\t\t${e.text}`).join('\n');

    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `reanimatie-${new Date().toISOString().slice(0,10)}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  // Reset (long press start knop wanneer gestopt)
  let resetTimer = null;
  btnStart.addEventListener('pointerdown', () => {
    if (isRunning) return;
    if (elapsedMs === 0) return;
    resetTimer = setTimeout(() => {
      elTimer.textContent = '00:00:00';
      elapsedMs = 0;
      entries = [];
      interimRow = null;
      interimTs = null;
      lastMinute = 0;
      elLog.innerHTML = '';
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.id = 'empty-state';
      empty.innerHTML = `<div class="empty-icon">🎙</div><div class="empty-label">Start de timer en spreek uw handelingen hardop uit. Elke zin krijgt automatisch een tijdstempel.</div>`;
      elLog.appendChild(empty);
      btnStart.innerHTML = `<svg class="icon-play" viewBox="0 0 16 16"><path d="M3 2.5l11 5.5-11 5.5V2.5z"/></svg> Start`;
      elRecText.textContent = 'Klaar om te starten';
      btnExport.disabled = true;
    }, 800);
  });
  btnStart.addEventListener('pointerup', () => clearTimeout(resetTimer));
  btnStart.addEventListener('pointerleave', () => clearTimeout(resetTimer));
</script>
</body>
</html>
